<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Area Loura — Tech Solutions</title>
<meta name="description" content="Area Loura — Tech Solutions. Recursos educativos y materiales académicos.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background-color: #ffffff;
    color: #111111;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 50px 40px 80px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 60px;
  }

  header .logo {
    width: 56px;
    height: 56px;
    object-fit: contain;
    flex-shrink: 0;
  }

  header .titles h1 {
    font-size: 22px;
    font-weight: 700;
    color: #111;
    margin-bottom: 2px;
  }

  header .titles h1 .brand,
  header .titles h1 .sub {
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  header .titles h1 .sep {
    margin: 0 4px;
    text-decoration: none;
    font-weight: 400;
  }

  header .titles p {
    color: #6b7280;
    font-size: 17px;
    font-weight: 400;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
    max-width: 1080px;
    margin: 0 auto;
  }

  .card {
    border: 1.5px solid #4a6fa5;
    border-radius: 18px;
    background: #ffffff;
    padding: 50px 24px;
    text-align: center;
    text-decoration: none;
    color: #111;
    font-size: 20px;
    font-weight: 400;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 130px;
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(74, 111, 165, 0.15);
    background-color: #f8fafd;
  }

  .card.placeholder {
    color: #111;
    cursor: default;
  }

  .card.placeholder:hover {
    transform: none;
    box-shadow: none;
    background-color: #ffffff;
  }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .wrap { padding: 40px 24px 60px; }
  }

  @media (max-width: 560px) {
    .grid { grid-template-columns: 1fr; gap: 16px; }
    header { flex-wrap: wrap; gap: 14px; }
    header .logo { width: 44px; height: 44px; }
    header .titles h1 { font-size: 18px; }
    header .titles p { font-size: 15px; }
    .card { padding: 36px 20px; min-height: 100px; font-size: 18px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <img class="logo" src="logo_alts.png" alt="Area Loura">
    <div class="titles">
      <h1><span class="brand">Area Loura</span><span class="sep"> — </span><span class="sub">Tech Solutions</span></h1>
      <p>Recursos educativos y materiales académicos.</p>
    </div>
  </header>

  <div class="grid">
    <a class="card placeholder" href="#">Recurso 1</a>
    <a class="card placeholder" href="#">Recurso 2</a>
    <a class="card placeholder" href="#">Recurso 3</a>
    <a class="card placeholder" href="#">Recurso 4</a>
    <a class="card placeholder" href="#">Recurso 5</a>
    <a class="card placeholder" href="#">Recurso 6</a>
    <a class="card placeholder" href="#">Recurso 7</a>
    <a class="card placeholder" href="#">Recurso 8</a>
    <a class="card placeholder" href="#">Recurso 9</a>
  </div>

</div>
</body>
</html>
